name: Coach settimanale (domenica)

on:
  schedule:
    - cron: "30 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Analisi settimanale del coach
        run: python garmin_report.py
        env:
          MODE: weekly
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Pubblica
        run: |
          git config user.name "apex-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Coach settimanale" || echo "Niente da aggiornare"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push
