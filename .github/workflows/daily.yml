name: Report Garmin giornaliero

on:
  schedule:
    # 21:00 UTC = 23:00 ora italiana d'estate (22:00 d'inverno).
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Genera report e dati
        run: python garmin_report.py
        env:
          GARMIN_EMAIL:      ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:   ${{ secrets.GARMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WHATSAPP_PHONE:    ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY:   ${{ secrets.WHATSAPP_APIKEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}

      - name: Pubblica i dati sull'app
        run: |
          git config user.name  "apex-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Report $(date +%F)" || echo "Niente da aggiornare"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push
