name: Dati Garmin (ogni giorno)

on:
  schedule:
    - cron: "0 21 * * *"     # 21:00 UTC = 23:00 estate / 22:00 inverno (Italia)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dati:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Scarica dati e aggiorna diario
        run: python garmin_report.py
        env:
          MODE: daily
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      - name: Pubblica
        run: |
          git config user.name  "apex-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Dati $(date +%F)" || echo "Niente da aggiornare"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push

