<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Apex · diario &amp; piano</title>

<meta name="theme-color" content="#0E1512">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apex">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" href="./icons/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0E1512; --surface:#18211D; --surface2:#202B26; --line:#26332C;
  --text:#E8EDE9; --muted:#8CA096;
  --green:#4ADE80; --amber:#FBBF24; --red:#F43F5E; --gray:#3C4A43;
  --cyan:#22D3EE;
  --disp:'Barlow Condensed',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
body{min-height:100dvh;padding-bottom:calc(76px + env(safe-area-inset-bottom))}
.wrap{max-width:480px;margin:0 auto;padding:0 18px}
button{font-family:inherit}

header{padding:calc(env(safe-area-inset-top) + 20px) 0 8px;display:flex;align-items:flex-end;justify-content:space-between}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-family:var(--disp);font-weight:700;font-size:34px;letter-spacing:2px;text-transform:uppercase;line-height:1}
.brand span{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.gear{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--muted);display:grid;place-items:center;cursor:pointer}
.gear svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}

.hero{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:18px;margin-top:16px;display:flex;gap:16px;align-items:center}
.ring{flex:0 0 auto}.ring .val{font-family:var(--mono);font-weight:700;font-size:20px}
.ring .lab{font-size:9px;fill:var(--muted);text-transform:uppercase;letter-spacing:1px}
.hero-txt{min-width:0}
.hero-eyebrow{font-family:var(--disp);font-weight:600;letter-spacing:2px;text-transform:uppercase;font-size:12px;color:var(--cyan)}
.hero-line{font-size:16px;font-weight:600;margin-top:2px;line-height:1.25}
.hero-sub{font-size:12px;color:var(--muted);margin-top:6px}

.calbar{display:flex;align-items:center;justify-content:space-between;margin:26px 2px 12px}
.calbar h2{font-family:var(--disp);font-weight:600;font-size:22px;letter-spacing:1px;text-transform:uppercase}
.navbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:18px;display:grid;place-items:center;cursor:pointer}
.navbtn:active{background:var(--surface2)}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.dow span{text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{aspect-ratio:1;border-radius:12px;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-family:var(--mono);font-size:14px;color:var(--muted);position:relative}
.cell.in{background:var(--surface);border-color:var(--line);color:var(--text)}
.cell.has{cursor:pointer}.cell.has:active{background:var(--surface2)}
.cell.today{border-color:var(--cyan)}
.cell.sel{outline:2px solid var(--cyan);outline-offset:-2px}
.dot{width:7px;height:7px;border-radius:50%}
.dot.green{background:var(--green)}.dot.amber{background:var(--amber)}
.dot.red{background:var(--red)}.dot.gray{background:var(--gray)}
.legend{display:flex;gap:14px;justify-content:center;margin-top:16px;font-size:11px;color:var(--muted)}
.legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}

.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--surface);border-top-left-radius:24px;border-top-right-radius:24px;border-top:1px solid var(--line);max-width:480px;margin:0 auto;transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.7,.2,1);max-height:86dvh;overflow:auto;padding:8px 20px calc(28px + env(safe-area-inset-bottom))}
.sheet.on{transform:translateY(0)}
.handle{width:40px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 14px}
.sheet .date{font-family:var(--disp);font-weight:600;font-size:20px;letter-spacing:1px;text-transform:uppercase}
.tomorrow{background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:14px;padding:13px 15px;margin:14px 0}
.tomorrow .k{font-family:var(--disp);letter-spacing:2px;text-transform:uppercase;font-size:11px;color:var(--cyan);font-weight:600}
.tomorrow .v{font-size:15px;font-weight:600;margin-top:3px;line-height:1.3}
.riepilogo{font-size:14px;color:#cdd8d1;line-height:1.55;margin:12px 0}
.punti{list-style:none;display:flex;flex-direction:column;gap:8px;margin:12px 0}
.punti li{font-size:13px;line-height:1.45;padding-left:16px;position:relative;color:#cdd8d1}
.punti li::before{content:"";position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;background:var(--cyan)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
.metric{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center}
.metric .m-val{font-family:var(--mono);font-weight:700;font-size:17px}
.metric .m-lab{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

/* piano */
.p-head{display:flex;align-items:center;justify-content:space-between;margin:18px 0 4px}
.p-head h3{font-family:var(--disp);font-weight:600;font-size:22px;letter-spacing:1px;text-transform:uppercase}
.p-obj{font-size:13px;color:var(--muted);margin-bottom:14px}
.p-load{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:14px;padding:13px 15px;margin-bottom:12px}
.p-load .k{font-family:var(--disp);letter-spacing:2px;text-transform:uppercase;font-size:11px;color:var(--amber);font-weight:600}
.p-load .v{font-size:14px;margin-top:3px;line-height:1.4;color:#cdd8d1}
.p-note{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:16px}
.cols-head{display:grid;grid-template-columns:34px 1fr 1fr;gap:8px;margin-bottom:6px}
.cols-head span{font-family:var(--disp);letter-spacing:1px;text-transform:uppercase;font-size:11px;font-weight:600;color:var(--muted);text-align:center}
.cols-head .mio{color:var(--text)}.cols-head .coach{color:var(--cyan)}
.prow{display:grid;grid-template-columns:34px 1fr 1fr;gap:8px;margin-bottom:8px;align-items:stretch}
.pday{font-family:var(--mono);font-size:12px;color:var(--muted);display:grid;place-items:center}
.pcell{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 10px;font-size:12.5px;line-height:1.35;color:#cdd8d1;min-height:44px;display:flex;align-items:center}
.pcell.coach.diff{border-color:var(--cyan);background:rgba(34,211,238,.06)}
.pcell input{width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:12.5px;outline:none}
.pcell.edit{border-color:var(--cyan)}
.pbtns{display:flex;gap:8px}
.btn{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:12px;padding:12px;font-family:var(--disp);letter-spacing:1px;text-transform:uppercase;font-weight:600;font-size:13px;cursor:pointer}
.btn.primary{background:var(--cyan);color:#04252b;border-color:var(--cyan)}
.btn:active{filter:brightness(.92)}
.p-msg{font-size:12px;margin-top:10px;min-height:16px}
.p-msg.ok{color:var(--green)}.p-msg.err{color:var(--red)}
.seg{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin:4px 0 12px}
.seg button{flex:1;border:none;background:none;color:var(--muted);padding:9px;border-radius:9px;font-family:var(--disp);letter-spacing:1px;text-transform:uppercase;font-size:12px;font-weight:600;cursor:pointer}
.seg button.on{background:var(--cyan);color:#04252b}
.wtabs{display:flex;gap:6px;margin-bottom:12px}
.wtabs button{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--muted);padding:8px;border-radius:10px;font-family:var(--mono);font-size:12px;cursor:pointer}
.wtabs button.on{border-color:var(--cyan);color:var(--cyan)}
.p-nota{width:100%;min-height:72px;background:var(--bg);border:1px solid var(--cyan);border-radius:10px;padding:10px;color:var(--text);font:inherit;font-size:13px;resize:vertical}

/* settings modal */
.modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:18px}
.modal.on{display:flex}
.modal-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;max-width:440px;width:100%;padding:20px;max-height:88dvh;overflow:auto}
.modal-card h3{font-family:var(--disp);letter-spacing:1px;text-transform:uppercase;font-size:20px;margin-bottom:4px}
.modal-card p{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px}
.field input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px;color:var(--text);font-family:var(--mono);font-size:13px}
.modal-card a{color:var(--cyan)}

.tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(14,21,18,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tabs-in{max-width:480px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr}
.tab{background:none;border:none;color:var(--muted);padding:14px 0 16px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:var(--disp);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-size:12px}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tab.active{color:var(--cyan)}
.view{display:none}.view.active{display:block}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand"><h1>Apex</h1><span>diario &amp; piano</span></div>
    <button class="gear" id="gear" aria-label="Impostazioni">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
    </button>
  </header>

  <!-- DIARIO -->
  <section id="diario" class="view active">
    <div id="hero"></div>
    <div class="calbar">
      <button class="navbtn" id="prev" aria-label="Mese precedente">‹</button>
      <h2 id="calTitle">—</h2>
      <button class="navbtn" id="next" aria-label="Mese successivo">›</button>
    </div>
    <div class="dow"><span>Lu</span><span>Ma</span><span>Me</span><span>Gi</span><span>Ve</span><span>Sa</span><span>Do</span></div>
    <div class="grid" id="grid"></div>
    <div class="legend">
      <span><i style="background:var(--green)"></i>pronto</span>
      <span><i style="background:var(--amber)"></i>moderato</span>
      <span><i style="background:var(--red)"></i>scarico</span>
    </div>
  </section>

  <!-- PIANO -->
  <section id="piano" class="view">
    <div id="planBody"></div>
  </section>
</div>

<!-- day detail -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="handle"></div><div id="sheetBody"></div>
</div>

<!-- settings -->
<div class="modal" id="modal">
  <div class="modal-card">
    <h3>Impostazioni</h3>
    <p>Per salvare il tuo piano dall'app serve un <b>token GitHub</b> (fine-grained,
       permesso <b>Contents: Read & Write</b> solo su questo repo). Resta solo su questo
       dispositivo. <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">Crea token</a></p>
    <div class="field"><label>Token GitHub</label><input id="cfgToken" type="password" placeholder="github_pat_..."></div>
    <div class="field"><label>Owner (utente)</label><input id="cfgOwner" placeholder="tuonome"></div>
    <div class="field"><label>Repository</label><input id="cfgRepo" placeholder="nome-repo"></div>
    <div class="field"><label>Branch</label><input id="cfgBranch" placeholder="main"></div>
    <div class="pbtns"><button class="btn" id="cfgClose">Chiudi</button><button class="btn primary" id="cfgSave">Salva</button></div>
  </div>
</div>

<!-- tabs -->
<nav class="tabs"><div class="tabs-in">
  <button class="tab active" data-tab="diario">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>Diario
  </button>
  <button class="tab" data-tab="piano">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="19" cy="18" r="2"/></svg>Piano
  </button>
</div></nav>

<script>
const MESI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const GIORNI=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const state={idx:{giorni:{}},year:0,month:0,sel:null,mio:null,coach:null,editing:false,tipo:null,wsel:0};
const $=s=>document.querySelector(s);
const iso=d=>d.toISOString().slice(0,10);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDate=d=>{const[y,m,dd]=d.split('-');return `${dd} ${MESI[+m-1]} ${y}`;};

/* ---------- config (token/repo) ---------- */
function detectRepo(){
  const h=location.hostname, owner=h.endsWith('.github.io')?h.split('.')[0]:'';
  const seg=location.pathname.split('/').filter(Boolean);
  const repo=seg.length?seg[0]:(owner?owner+'.github.io':'');
  return {owner,repo};
}
function getCfg(){
  const d=detectRepo();
  let s={}; try{s=JSON.parse(localStorage.getItem('apexCfg')||'{}');}catch(e){}
  return {owner:s.owner||d.owner, repo:s.repo||d.repo, branch:s.branch||'main', token:s.token||''};
}
function saveCfg(c){localStorage.setItem('apexCfg',JSON.stringify(c));}

/* ---------- load ---------- */
async function jget(p){try{const r=await fetch(p+'?ts='+Date.now());if(r.ok)return await r.json();}catch(e){}return null;}
async function load(){
  state.idx=await jget('./data/index.json')||{giorni:{}};
  const now=new Date();state.year=now.getFullYear();state.month=now.getMonth();
  renderHero();renderCal();
}

/* ---------- diario ---------- */
async function renderHero(){
  const today=iso(new Date()),host=$('#hero'),info=state.idx.giorni?.[today];
  if(!info){host.innerHTML='<div class="hero"><div class="hero-txt"><div class="hero-eyebrow">In attesa</div><div class="hero-line">Il primo report arriva dopo la prossima uscita.</div><div class="hero-sub">Il diario si riempie da solo ogni sera.</div></div></div>';return;}
  const day=await jget('./data/'+today+'.json')||{};
  const p=info.prontezza,col=info.color||'gray';
  const cvar={green:'var(--green)',amber:'var(--amber)',red:'var(--red)',gray:'var(--gray)'}[col];
  const pct=Math.max(0,Math.min(100,p||0)),C=2*Math.PI*26,off=C*(1-pct/100);
  host.innerHTML=`<div class="hero"><div class="ring"><svg width="76" height="76" viewBox="0 0 76 76">
      <circle cx="38" cy="38" r="26" stroke="var(--line)" stroke-width="7" fill="none"/>
      <circle cx="38" cy="38" r="26" stroke="${cvar}" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 38 38)"/>
      <text class="val" x="38" y="36" text-anchor="middle" fill="var(--text)">${p??'–'}</text>
      <text class="lab" x="38" y="48" text-anchor="middle">pronto</text></svg></div>
    <div class="hero-txt"><div class="hero-eyebrow">Domani</div><div class="hero-line">${esc(day.domani||'—')}</div>
      <div class="hero-sub">Tocca oggi nel calendario per il resoconto completo.</div></div></div>`;
}
function renderCal(){
  $('#calTitle').textContent=MESI[state.month]+' '+state.year;
  const grid=$('#grid');grid.innerHTML='';
  const first=new Date(state.year,state.month,1);let start=(first.getDay()+6)%7;
  const days=new Date(state.year,state.month+1,0).getDate(),today=iso(new Date());
  for(let i=0;i<start;i++){const c=document.createElement('div');c.className='cell';grid.appendChild(c);}
  for(let d=1;d<=days;d++){
    const date=`${state.year}-${String(state.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info=state.idx.giorni?.[date],cell=document.createElement('div');
    cell.className='cell in'+(info?' has':'')+(date===today?' today':'')+(date===state.sel?' sel':'');
    cell.innerHTML=`<span>${d}</span>`+(info?`<span class="dot ${info.color||'gray'}"></span>`:'<span class="dot" style="background:transparent"></span>');
    if(info)cell.onclick=()=>openDay(date);
    grid.appendChild(cell);
  }
}
async function openDay(date){
  state.sel=date;renderCal();
  const day=await jget('./data/'+date+'.json')||{},m=day.metriche||{};
  const met=[['prontezza','Prontezza'],['fc_riposo','FC riposo'],['hrv','HRV'],['sonno_h','Sonno h'],['vo2max','VO₂max'],['carico_7gg_km','Km 7gg']]
    .filter(([k])=>m[k]!==undefined&&m[k]!==null&&m[k]!=='')
    .map(([k,l])=>`<div class="metric"><div class="m-val">${esc(String(m[k]))}</div><div class="m-lab">${l}</div></div>`).join('');
  const punti=(day.punti||[]).map(p=>`<li>${esc(p)}</li>`).join('');
  $('#sheetBody').innerHTML=`<div class="date">${fmtDate(date)}</div>
    ${day.domani?`<div class="tomorrow"><div class="k">Domani</div><div class="v">${esc(day.domani)}</div></div>`:''}
    ${day.riepilogo?`<div class="riepilogo">${esc(day.riepilogo)}</div>`:''}
    ${punti?`<ul class="punti">${punti}</ul>`:''}
    ${m.ultima_attivita?`<div class="hero-sub">Ultima attività: ${esc(m.ultima_attivita)}</div>`:''}
    ${met?`<div class="metrics">${met}</div>`:''}`;
  $('#scrim').classList.add('on');$('#sheet').classList.add('on');
}
function closeSheet(){$('#scrim').classList.remove('on');$('#sheet').classList.remove('on');}

/* ---------- piano (due colonne) ---------- */
async function renderPlan(){
  if(!state.mio) state.mio=await jget('./data/mio_piano.json')||{obiettivo:'',giorni:{}};
  if(!state.coach) state.coach=await jget('./data/plan.json')||{giorni:{}};
  const mio=state.mio,coach=state.coach,ed=state.editing;
  if(state.tipo===null) state.tipo=mio.tipo||'settimanale';
  const gd=(o)=> state.tipo==='mensile' ? ((o.settimane&&o.settimane[state.wsel])||{}) : (o.giorni||{});
  const mioW=gd(mio), coachW=gd(coach);
  const rows=GIORNI.map(g=>{
    const mv=mioW[g]||'', cv=coachW[g]||'';
    const diff=cv&&cv.trim()!==mv.trim();
    const mioCell=ed?`<div class="pcell edit"><input data-day="${g}" value="${esc(mv)}"></div>`:`<div class="pcell">${esc(mv||'—')}</div>`;
    return `<div class="prow"><div class="pday">${g}</div>${mioCell}<div class="pcell coach${diff?' diff':''}">${esc(cv||'—')}</div></div>`;
  }).join('');
  const seg=`<div class="seg"><button class="${state.tipo==='settimanale'?'on':''}" data-tipo="settimanale">Settimanale</button><button class="${state.tipo==='mensile'?'on':''}" data-tipo="mensile">Mensile</button></div>`;
  const wtabs=state.tipo==='mensile'?`<div class="wtabs">${[0,1,2,3].map(i=>`<button class="${state.wsel===i?'on':''}" data-w="${i}">S${i+1}</button>`).join('')}</div>`:'';
  const btns=ed
    ? `<div class="pbtns"><button class="btn" id="pCancel">Annulla</button><button class="btn primary" id="pSave">Salva</button></div>`
    : `<div class="pbtns"><button class="btn" id="pEdit">Modifica il mio piano</button></div>`;
  $('#planBody').innerHTML=`
    <div class="p-head"><h3>Piano</h3></div>
    ${ed?`<div class="p-obj"><input id="pObj" value="${esc(mio.obiettivo||'')}" placeholder="Il tuo obiettivo" style="width:100%;background:var(--bg);border:1px solid var(--cyan);border-radius:8px;padding:8px;color:var(--text);font:inherit"></div>`:(mio.obiettivo?`<div class="p-obj">Obiettivo: ${esc(mio.obiettivo)}</div>`:'')}
    ${seg}${wtabs}
    ${coach.riepilogo_settimana?`<div class="p-note" style="color:#cdd8d1;margin-bottom:12px">${esc(coach.riepilogo_settimana)}</div>`:''}
    ${coach.carico_prossimo?`<div class="p-load"><div class="k">Carico proposto</div><div class="v">${esc(coach.carico_prossimo)}</div></div>`:''}
    ${coach.note?`<div class="p-note">${esc(coach.note)}</div>`:''}
    <div class="cols-head"><span></span><span class="mio">Il mio</span><span class="coach">Coach</span></div>
    ${rows}
    ${ed?`<div style="margin:16px 0 4px"><span style="font-family:var(--disp);letter-spacing:1px;text-transform:uppercase;font-size:11px;font-weight:600;color:var(--text)">Note per il coach</span></div><textarea id="pNota" class="p-nota" placeholder="Es: martedì saltato per stanchezza; sabato bici sostituito con palestra...">${esc(mio.note||'')}</textarea>`:(mio.note?`<div class="p-note" style="margin-top:14px"><b style="color:var(--cyan)">Note:</b> ${esc(mio.note)}</div>`:'')}
    ${btns}
    <div class="p-msg" id="pMsg"></div>
    <div class="hero-sub" style="margin-top:10px">${state.tipo==='mensile'?'Piano mensile · settimana '+(state.wsel+1)+' di 4. ':''}Aggiornato dal coach: ${esc(coach.aggiornato||'—')}. In azzurro le proposte diverse dal tuo piano.</div>`;
  document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{
    const t=b.dataset.tipo; if(t===state.tipo)return;
    if(t==='mensile'&&!Array.isArray(state.mio.settimane)){const base=state.mio.giorni||{};state.mio.settimane=[{...base},{...base},{...base},{...base}];}
    state.tipo=t; state.mio.tipo=t; state.editing=false; state.wsel=0; renderPlan();
  });
  document.querySelectorAll('.wtabs button').forEach(b=>b.onclick=()=>{state.wsel=+b.dataset.w;state.editing=false;renderPlan();});
  if(ed){$('#pCancel').onclick=()=>{state.editing=false;renderPlan();};$('#pSave').onclick=salvaPiano;}
  else{$('#pEdit').onclick=()=>{state.editing=true;renderPlan();};}
}
async function salvaPiano(){
  const msg=$('#pMsg');msg.className='p-msg';msg.textContent='Salvo…';
  const giorni={};document.querySelectorAll('#planBody input[data-day]').forEach(i=>giorni[i.dataset.day]=i.value.trim());
  const _o=document.getElementById('pObj');const _ob=_o?_o.value.trim():(state.mio.obiettivo||'');
  const nuovo={obiettivo:_ob,tipo:state.tipo,aggiornato:iso(new Date())};
  if(state.tipo==='mensile'){
    let sett=Array.isArray(state.mio.settimane)?state.mio.settimane.map(w=>({...w})):[{},{},{},{}];
    while(sett.length<4)sett.push({});
    sett[state.wsel]=giorni; nuovo.settimane=sett; nuovo.giorni=state.mio.giorni||{};
  }else{ nuovo.giorni=giorni; }
  const _n=document.getElementById('pNota');nuovo.note=_n?_n.value.trim():(state.mio.note||'');
  const cfg=getCfg();
  if(!cfg.token){msg.className='p-msg err';msg.innerHTML='Manca il token GitHub. Aprilo con l\'ingranaggio in alto.';return;}
  try{
    await ghPut('docs/data/mio_piano.json',nuovo,'Aggiorno il mio piano dall\'app',cfg);
    state.mio=nuovo;state.editing=false;renderPlan();
    const m2=$('#pMsg');m2.className='p-msg ok';m2.textContent='Salvato. Il coach ne terrà conto alla revisione di domenica.';
  }catch(e){msg.className='p-msg err';msg.textContent='Errore: '+e.message;}
}

async function ghPut(path,obj,message,cfg){
  const api=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const hdr={Authorization:'Bearer '+cfg.token,Accept:'application/vnd.github+json','Content-Type':'application/json'};
  let sha=null;
  const g=await fetch(api+'?ref='+cfg.branch,{headers:hdr});
  if(g.ok)sha=(await g.json()).sha;
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,2))));
  const body={message,content,branch:cfg.branch};if(sha)body.sha=sha;
  const p=await fetch(api,{method:'PUT',headers:hdr,body:JSON.stringify(body)});
  if(!p.ok)throw new Error('GitHub '+p.status);
}

/* ---------- settings modal ---------- */
function openCfg(){
  const c=getCfg();
  $('#cfgToken').value=c.token;$('#cfgOwner').value=c.owner;$('#cfgRepo').value=c.repo;$('#cfgBranch').value=c.branch;
  $('#modal').classList.add('on');
}
$('#gear').onclick=openCfg;
$('#cfgClose').onclick=()=>$('#modal').classList.remove('on');
$('#cfgSave').onclick=()=>{
  saveCfg({token:$('#cfgToken').value.trim(),owner:$('#cfgOwner').value.trim(),repo:$('#cfgRepo').value.trim(),branch:$('#cfgBranch').value.trim()||'main'});
  $('#modal').classList.remove('on');
};

/* ---------- nav ---------- */
$('#prev').onclick=()=>{state.month--;if(state.month<0){state.month=11;state.year--;}renderCal();};
$('#next').onclick=()=>{state.month++;if(state.month>11){state.month=0;state.year++;}renderCal();};
$('#scrim').onclick=closeSheet;
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  const t=b.dataset.tab;
  $('#diario').classList.toggle('active',t==='diario');
  $('#piano').classList.toggle('active',t==='piano');
  if(t==='piano')renderPlan();
});

load();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
